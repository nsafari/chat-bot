<div class="modal-backdrop" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Upgrade to continue</h2>
      <button class="btn-close" (click)="close()" aria-label="Close">&times;</button>
    </div>
    <p class="modal-desc">Add credits to your wallet to send more messages.</p>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="pay()" class="payment-form">
      <div class="field">
        <label>Amount (Rials)</label>
        <input type="number" formControlName="amount" min="1000" step="1000" />
      </div>
      <div class="field">
        <label>Discount code</label>
        <div class="discount-row">
          <input type="text" formControlName="discount_code" placeholder="Optional" />
          <button type="button" class="btn-validate" (click)="validateDiscount()">Validate</button>
        </div>
        @if (discountValid(); as d) {
          <span class="discount-msg" [class.valid]="d.valid" [class.invalid]="!d.valid">
            {{ d.message }}
          </span>
        }
      </div>
      <div class="summary">
        <span>Total:</span>
        <strong>{{ formatRials(displayAmount) }}</strong>
      </div>
      <button type="submit" class="btn-pay" [disabled]="loading()">
        {{ loading() ? 'Redirecting...' : 'Pay & continue' }}
      </button>
    </form>
  </div>
</div>
