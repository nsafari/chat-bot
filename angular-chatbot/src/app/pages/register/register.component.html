<div class="register-page">
  <div class="register-card">
    <h1>ایجاد حساب</h1>
    <p class="subtitle">شروع با چت‌بات هوش مصنوعی</p>

    @if (error) {
      <div class="error-banner">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
      <div class="field">
        <label for="email">ایمیل</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <div class="field">
        <label for="username">نام کاربری</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="johndoe"
          autocomplete="username"
        />
      </div>
      <div class="field">
        <label for="full_name">نام کامل</label>
        <input
          id="full_name"
          type="text"
          formControlName="full_name"
          placeholder="علی محمدی"
        />
      </div>
      <div class="field">
        <label for="password">رمز عبور</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="new-password"
        />
        <span class="hint">حداقل ۶ کاراکتر</span>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'در حال ایجاد...' : 'ایجاد حساب' }}
      </button>
    </form>

    <div class="divider">
      <span>یا ثبت‌نام با</span>
    </div>

    <div class="social-buttons">
      <a [href]="googleLoginUrl" class="btn-social">گوگل</a>
      <a [href]="githubLoginUrl" class="btn-social">گیت‌هاب</a>
    </div>

    <p class="footer-link">
      قبلاً ثبت‌نام کردید؟ <a routerLink="/login">ورود</a>
    </p>
  </div>
</div>
