<div class="register-page">
  <div class="register-card">
    <h1>ایجاد حساب</h1>
    <p class="subtitle">ثبت‌نام با شماره موبایل و کد تایید</p>

    @if (error) {
      <div class="error-banner">{{ error }}</div>
    }
    @if (otpMessage) {
      <div class="success-banner">{{ otpMessage }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
      <div class="field">
        <label for="phone_number">شماره موبایل</label>
        <input
          id="phone_number"
          type="tel"
          formControlName="phone_number"
          placeholder="09120000000"
          autocomplete="tel"
        />
        <span class="hint">شماره را با 0 اول وارد کنید</span>
      </div>

      <button type="button" class="btn-secondary" [disabled]="otpLoading" (click)="requestOtp()">
        @if (otpLoading) {
          در حال ارسال کد...
        } @else {
          ارسال کد تایید
        }
      </button>

      @if (otpRequested) {
        <div class="field" [formGroup]="otpForm">
          <label for="otp_code">کد تایید</label>
          <div class="otp-row">
            <input
              id="otp_code"
              type="text"
              formControlName="code"
              placeholder="کد 4 تا 8 رقمی"
              inputmode="numeric"
            />
            <button type="button" class="btn-verify" [disabled]="verifyingOtp" (click)="verifyOtp()">
              {{ verifyingOtp ? 'در حال بررسی...' : 'تایید کد' }}
            </button>
          </div>
          @if (otpVerified) {
            <span class="success-text">شماره موبایل تایید شد.</span>
          } @else {
            <span class="hint">ابتدا کد تایید را ارسال و تایید کنید</span>
          }
        </div>

        <div class="field">
          <label for="password">رمز عبور</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <span class="hint">حداقل ۶ کاراکتر</span>
        </div>
        <button type="button" class="btn-secondary" [disabled]="otpLoading" (click)="restartOtpFlow()">
          ارسال مجدد کد
        </button>
        <button type="submit" class="btn-primary" [disabled]="loading || !otpVerified">
          {{ loading ? 'در حال ایجاد...' : 'ایجاد حساب' }}
        </button>
      }
    </form>

    <p class="footer-link">
      قبلاً ثبت‌نام کردید؟ <a routerLink="/login">ورود</a>
    </p>
  </div>
</div>
