<div class="login-page">
  <div class="login-card">
    <h1>خوش آمدید</h1>
    <p class="subtitle">برای ادامه وارد شوید</p>

    @if (error) {
      <div class="error-banner">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="login">ایمیل یا نام کاربری</label>
        <input
          id="login"
          type="text"
          formControlName="login"
          placeholder="you@example.com"
          autocomplete="username"
        />
      </div>
      <div class="field">
        <label for="password">رمز عبور</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'در حال ورود...' : 'ورود' }}
      </button>
    </form>

    <div class="divider">
      <span>یا با ادامه دهید</span>
    </div>

    <div class="social-buttons">
      <a [href]="googleLoginUrl" class="btn-social">گوگل</a>
      <a [href]="githubLoginUrl" class="btn-social">گیت‌هاب</a>
    </div>

    <p class="footer-link">
      حساب ندارید؟ <a routerLink="/register">ثبت‌نام</a>
    </p>
  </div>
</div>
